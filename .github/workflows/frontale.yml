name: FRONTale NEWS WATCHER


on:

  workflow_dispatch:



concurrency:

  group: FRONTale-news-watchers

  cancel-in-progress: false



jobs:


  check:


    runs-on: ubuntu-latest


    permissions:

      contents: write



    steps:


      - uses: actions/checkout@v4



      - uses: actions/setup-python@v5

        with:

          python-version: "3.12"



      - name: install dependencies

        run: pip install requests beautifulsoup4



      - name: run watcher

        run: python watch_frontale.py

        env:

          FRONTALE_WEBHOOK: ${{ secrets.FRONTale_WEBHOOK }}



      - name: update seen file

        run: |

          git config user.name github-actions

          git config user.email github-actions@github.com


          git add seen_frontale.json


          git diff --cached --quiet || git commit -m "update frontale seen"


          git pull --rebase origin main


          git push origin main
