name: RUN ALL WATCHERS

on:
  workflow_dispatch:

concurrency:
  group: run-all-watchers
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  watchers:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install dependencies
        run: pip install requests beautifulsoup4

      - name: run all watchers (safe mode)
        id: run
        run: |
          set +e

          echo "=== START WATCHERS ==="

          DISCORD_WEBHOOK="${{ secrets.DISCORD_WEBHOOK }}" python watch_jef.py
          echo "[jef] exit=$?"

          FRONTale_WEBHOOK="${{ secrets.FRONTale_WEBHOOK }}" python watch_frontale.py
          echo "[frontale] exit=$?"

          BLACKRAMS_WEBHOOK="${{ secrets.BLACKRAMS_WEBHOOK }}" python watch_blackrams.py
          echo "[blackrams] exit=$?"

          JETS_WEBHOOK="${{ secrets.JETS_WEBHOOK }}" python watch_jets.py
          echo "[jets] exit=$?"

          echo "=== DONE WATCHERS ==="

      - name: commit seen files
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add seen*.json
          git diff --cached --quiet || git commit -m "update seen"

          git pull --rebase origin main
          git push origin main

      - name: error notify (only if hard failure)
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
          -d '{
            "content":"⚠️ RUN ALL WATCHERS HARD FAILURE\nhttps://github.com/${{ github.repository }}/actions"
          }' \
          ${{ secrets.ERROR_WEBHOOK }}
