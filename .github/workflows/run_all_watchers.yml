name: RUN ALL WATCHERS

on:
  workflow_dispatch:

concurrency:
  group: run-all-watchers
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  watchers:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('**/requirements.txt') }}

      - name: install dependencies
        run: pip install requests beautifulsoup4

      - name: run all watchers
        run: |
          python watch_jef.py
          python watch_frontale.py
          python watch_blackrams.py
          python watch_jets.py

      - name: commit updated seen files
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add seen*.json

          git diff --cached --quiet || git commit -m "update seen"

          git pull --rebase origin main
          git push origin main

      - name: notify error
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
          -d '{
            "content":"⚠️ RUN ALL WATCHERS FAILED\nhttps://github.com/${{ github.repository }}/actions"
          }' \
          ${{ secrets.ERROR_WEBHOOK }}
