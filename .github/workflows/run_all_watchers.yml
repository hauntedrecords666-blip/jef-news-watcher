      - name: save
        id: save
        continue-on-error: true
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add seen*.json

          git diff --cached --quiet || git commit -m "update seen"

          git push origin main


      - name: Save error notify
        if: steps.save.outcome == 'failure'

        run: |
          curl -H "Content-Type: application/json" \
          -d '{
            "content":"⚠️ NEWS WATCHER SAVE ERROR\nGit push失敗\n確認してください\nhttps://github.com/${{ github.repository }}/actions"
          }' \
          ${{ secrets.ERROR_WEBHOOK }}
