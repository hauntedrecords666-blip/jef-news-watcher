name: RUN ALL WATCHERS

on:
  workflow_dispatch:

permissions:
  actions: write

jobs:

  trigger:
    runs-on: ubuntu-latest

    steps:

      - name: Run BlackRams
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'blackrams.yml',
              ref: 'main'
            })


      - name: Run JEF
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'jef.yml',
              ref: 'main'
            })


      - name: Run Watcher3
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'flontale.yml',
              ref: 'main'
            })